name: Build and Publish Docker Image

on:
  push:
    branches: [main]
  # Also rebuild after either nightly data update so the published image
  # always contains fresh EIA and FRED data.
  workflow_run:
    workflows: ["Update EIA Fundamentals Data", "Update FRED Yield Curve Data"]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # When triggered by workflow_run, only proceed if the upstream job succeeded.
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # workflow_run events check out the default branch, not the triggering SHA;
          # use ref: main to ensure we get the latest committed feather file.
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          # amd64 only — arm64 via QEMU emulation takes 1+ hour for R packages.
          # M1/M2 Mac users can run this image transparently via Docker Rosetta 2.
          platforms: linux/amd64
          push: true
          tags: |
            alexhirtle/fin452golem:latest
            alexhirtle/fin452golem:${{ github.sha }}
          # Layer cache speeds up repeated builds (DESCRIPTION unchanged → deps skipped).
          cache-from: type=gha
          cache-to: type=gha,mode=max
