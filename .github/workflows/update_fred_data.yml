name: Update FRED Yield Curve Data

on:
  schedule:
    # 06:00 UTC daily — FRED updates overnight, this catches the prior day's close
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          install.packages(
            c("dplyr", "purrr", "arrow"),
            repos = "https://cloud.r-project.org"
          )
        shell: Rscript {0}

      - name: Fetch FRED data
        run: Rscript dev/fetch_fred_data.R

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add inst/extdata/fred_zero_curve.feather \
                  inst/extdata/fred_zero_curve_last_updated.txt
          git diff --staged --quiet || \
            git commit -m "chore: update FRED yield curve data [skip ci]"
          git pull --rebase origin main
          git push
